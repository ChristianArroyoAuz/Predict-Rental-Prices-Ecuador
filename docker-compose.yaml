version: '3.8'

services:
  api:
    build: .
    container_name: rental-prediction-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # Opcional: interfaz simple con Streamlit
  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rental-prediction-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0